    (set b1 (if (lt hours hours_threshold) b1 0)) (give b1 'for resolving it in less
    than ${hours_threshold} hours') 'add ${b1} points if it was resolved in less than
    ${hours_threshold} hours') (aka (let self_fee 16) (set penalty_for_self (if (eq
