    reported by you earlier') 'deduct ${self_fee} points if they resolved the bug
    earlier reported by themselves') (aka (let day_fee 1.0) (set b2 (times -1 (times
    days day_fee))) (let days_fee_max -20) (set b2 (max b2 days_fee_max)) (give b2
